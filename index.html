<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Forever ❤️</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffe6eb, #fff);
    font-family: 'Segoe UI', sans-serif;
}

.card {
    width: 100%;
    max-width: 360px;
    height: 100%;
    max-height: 640px;
    background: white;
    border-radius: 22px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.intro-gif {
    width: 220px;
    margin: 10px auto;
}

h1 {
    font-size: 20px;
    margin: 10px 0;
}

.buttons {
    position: relative;
    height: 160px;
    width: 100%;
    overflow: hidden;
}

button {
    padding: 12px 26px;
    font-size: 16px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    position: absolute;
}

#yes {
    background: #ff4d6d;
    color: white;
    left: 50%;
    bottom: 10px;
    transform: translateX(-50%);
    z-index: 2;
}

#no {
    background: #e0e0e0;
    color: #333;
    top: 10px;
    left: 10px;
    z-index: 1;
    transition: all 0.2s ease;
}

.love-page {
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.love-page img {
    width: 100%;
    max-height: 260px;
    object-fit: contain;
    margin-bottom: 15px;
}

.love-page h2 {
    color: #ff4d6d;
    margin-bottom: 10px;
}

.love-page p {
    font-size: 16px;
    line-height: 1.4;
}
</style>
</head>

<body>

<div class="card" id="mainCard">

    <img class="intro-gif"
         src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3cGh5ZGFycml2N3d6am81NjVjNmtudGZnOHV1NzFqNmR6aHBpMmxudyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/49Y8rikUtEyoX0iU7h/giphy.gif"
         alt="Love">

    <h1>Vanshika, will you be my forever? 💖</h1>

    <div class="buttons" id="box">
        <button id="yes">Yes 💕</button>
        <button id="no">No 🙈</button>
    </div>

</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const box = document.getElementById("box");

let lastX = 0;
let lastY = 0;
let scale = 1;

function moveNoButton() {
    const boxW = box.clientWidth;
    const boxH = box.clientHeight;
    const noW = noBtn.offsetWidth;
    const noH = noBtn.offsetHeight;

    const MIN_DISTANCE = 260; // ~7cm

    let x, y, distance = 0;

    while (distance < MIN_DISTANCE) {
        x = Math.random() * (boxW - noW);
        y = Math.random() * (boxH - noH);

        distance = Math.sqrt(
            Math.pow(x - lastX, 2) + Math.pow(y - lastY, 2)
        );
    }

    lastX = x;
    lastY = y;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    // Shrink effect
    scale *= 0.9;
    if (scale < 0.4) scale = 0.4;

    noBtn.style.transform = `scale(${scale})`;
}

// Trigger movement
["mouseenter", "touchstart", "touchmove"].forEach(evt => {
    noBtn.addEventListener(evt, moveNoButton);
});

// YES CLICK
yesBtn.addEventListener("click", () => {
    document.getElementById("mainCard").innerHTML = `
        <div class="love-page">
            <img src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3MXAzaDJxZjZkNjl1Z3J2NmxkemRjaXFvZnljYzA1eGl1YWI4dGN1NiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/f9EmXxglhdhAj1bo28/giphy.gif">
            <h2>Yayyy! 💍❤️</h2>
            <p>
                You just made my heart the happiest place ever 🥹💖<br>
                Forever starts now… with you 💫
            </p>
        </div>
    `;
});
</script>

</body>
</html>
