<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Forever ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden; /* 🚫 NO SCROLL */
}

body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffe6eb, #fff);
    font-family: 'Segoe UI', sans-serif;
}

.card {
    width: 100%;
    max-width: 360px;
    height: 100%;
    max-height: 640px;
    background: #fff;
    border-radius: 22px;
    padding: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    text-align: center;
}

.intro-gif {
    width: 220px;
    margin: 10px auto;
}

h1 {
    font-size: 20px;
    margin: 10px 0;
}

.buttons {
    position: relative;
    width: 100%;
    height: 170px;
    overflow: hidden;
}

button {
    position: absolute;
    padding: 12px 26px;
    font-size: 16px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
}

#yes {
    background: #ff4d6d;
    color: white;
    left: 50%;
    bottom: 10px;
    transform: translateX(-50%);
    z-index: 2;
}

#no {
    background: #e0e0e0;
    color: #333;
    top: 10px;
    left: 10px;
    z-index: 1;
}

.love-page {
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.love-page img {
    width: 100%;
    max-height: 260px;
    object-fit: contain;
    margin-bottom: 15px;
}

.love-page h2 {
    color: #ff4d6d;
    margin-bottom: 10px;
}

.love-page p {
    font-size: 16px;
    line-height: 1.4;
}
</style>
</head>

<body>

<div class="card" id="mainCard">

    <!-- FIRST PAGE GIF -->
    <img class="intro-gif"
         src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3cGh5ZGFycml2N3d6am81NjVjNmtudGZnOHV1NzFqNmR6aHBpMmxudyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/49Y8rikUtEyoX0iU7h/giphy.gif"
         alt="Cute Love">

    <h1>Vanshika, will you be my forever? 💖</h1>

    <div class="buttons" id="box">
        <button id="yes">Yes 💕</button>
        <button id="no">No 🙈</button>
    </div>

</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const box = document.getElementById("box");

const MIN_DISTANCE = 280; // ≈ 7cm

function moveNoButton() {
    const boxW = box.clientWidth;
    const boxH = box.clientHeight;
    const noW = noBtn.offsetWidth;
    const noH = noBtn.offsetHeight;

    const yesRect = yesBtn.getBoundingClientRect();
    const boxRect = box.getBoundingClientRect();

    let x, y, distance;

    do {
        x = Math.random() * (boxW - noW);
        y = Math.random() * (boxH - noH);

        const noCenterX = boxRect.left + x + noW / 2;
        const noCenterY = boxRect.top + y + noH / 2;

        const yesCenterX = yesRect.left + yesRect.width / 2;
        const yesCenterY = yesRect.top + yesRect.height / 2;

        distance = Math.hypot(
            noCenterX - yesCenterX,
            noCenterY - yesCenterY
        );
    } while (distance < MIN_DISTANCE);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

// SUPER FAST ESCAPE
["mouseenter", "touchstart", "touchmove"].forEach(event => {
    noBtn.addEventListener(event, moveNoButton);
});

// YES CLICK → SECOND PAGE
yesBtn.addEventListener("click", () => {
    document.getElementById("mainCard").innerHTML = `
        <div class="love-page">
            <img src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3MXAzaDJxZjZkNjl1Z3J2NmxkemRjaXFvZnljYzA1eGl1YWI4dGN1NiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/f9EmXxglhdhAj1bo28/giphy.gif">
            <h2>Yayyy! 💍❤️</h2>
            <p>
                You just made my heart the happiest place ever 🥹💖<br>
                Forever starts now… with you 💫
            </p>
        </div>
    `;
});
</script>

</body>
</html>
