<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever ❤️</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffe6eb, #fff);
    font-family: 'Segoe UI', sans-serif;
}

.card {
    width: 90%;
    max-width: 340px;
    background: white;
    padding: 20px;
    border-radius: 22px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}

.intro-gif {
    width: 200px;
    margin: 0 auto 12px;
    display: block;
}

h1 {
    font-size: 20px;
    margin-bottom: 18px;
}

.buttons {
    position: relative;
    height: 130px;
    width: 100%;
    overflow: hidden;
}

button {
    padding: 12px 26px;
    font-size: 16px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    position: absolute;
    white-space: nowrap;
}

#yes {
    background: #ff4d6d;
    color: white;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
    z-index: 2;
}

#no {
    background: #e0e0e0;
    color: #333;
    left: 10px;
    top: 0;
    z-index: 1;
}

.love-page img {
    width: 100%;
    max-height: 220px;
    object-fit: contain;
    border-radius: 16px;
    margin-bottom: 14px;
}

.love-page h2 {
    color: #ff4d6d;
}
</style>
</head>

<body>

<div class="card" id="mainCard">

    <!-- 💖 FIRST PAGE GIF (YOUR CHOICE) -->
    <img class="intro-gif"
         src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3cGh5ZGFycml2N3d6am81NjVjNmtudGZnOHV1NzFqNmR6aHBpMmxudyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/49Y8rikUtEyoX0iU7h/giphy.gif"
         alt="Cute Love">

    <h1>Vanshika, will you be my forever? 💖</h1>

    <div class="buttons" id="buttonBox">
        <button id="yes">Yes 💕</button>
        <button id="no">No 🙈</button>
    </div>
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const box = document.getElementById("buttonBox");

// 🚀 Fast + smart NO button movement
function moveNoButtonFast() {
    const boxRect = box.getBoundingClientRect();
    const yesRect = yesBtn.getBoundingClientRect();

    let x, y;
    let safe = false;

    while (!safe) {
        x = Math.random() * (box.clientWidth - noBtn.offsetWidth);
        y = Math.random() * (box.clientHeight - noBtn.offsetHeight);

        // Check distance from YES button
        const noRect = {
            left: boxRect.left + x,
            top: boxRect.top + y,
            right: boxRect.left + x + noBtn.offsetWidth,
            bottom: boxRect.top + y + noBtn.offsetHeight
        };

        safe =
            noRect.right < yesRect.left - 10 ||
            noRect.left > yesRect.right + 10 ||
            noRect.bottom < yesRect.top - 10 ||
            noRect.top > yesRect.bottom + 10;
    }

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

// Move FAST (before click)
noBtn.addEventListener("mouseover", moveNoButtonFast);
noBtn.addEventListener("touchstart", moveNoButtonFast);

// 💖 YES CLICK → SECOND PAGE
document.getElementById("yes").addEventListener("click", () => {
    document.getElementById("mainCard").innerHTML = `
        <div class="love-page">
            <img src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3MXAzaDJxZjZkNjl1Z3J2NmxkemRjaXFvZnljYzA1eGl1YWI4dGN1NiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/f9EmXxglhdhAj1bo28/giphy.gif">
            <h2>Yayyy! 💍❤️</h2>
            <p>Forever starts now… with you 💫</p>
        </div>
    `;
});
</script>

</body>
</html>
