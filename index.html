<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const box = document.getElementById("box");

const MIN_DISTANCE = 280; // ≈ 7cm on most screens

function moveNoButton() {
    const boxW = box.clientWidth;
    const boxH = box.clientHeight;
    const noW = noBtn.offsetWidth;
    const noH = noBtn.offsetHeight;

    const yesRect = yesBtn.getBoundingClientRect();
    const boxRect = box.getBoundingClientRect();

    let x, y, distance;

    do {
        x = Math.random() * (boxW - noW);
        y = Math.random() * (boxH - noH);

        const noCenterX = boxRect.left + x + noW / 2;
        const noCenterY = boxRect.top + y + noH / 2;

        const yesCenterX = yesRect.left + yesRect.width / 2;
        const yesCenterY = yesRect.top + yesRect.height / 2;

        distance = Math.hypot(
            noCenterX - yesCenterX,
            noCenterY - yesCenterY
        );

    } while (distance < MIN_DISTANCE);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

// Trigger early & aggressively
["mouseenter", "touchstart", "touchmove"].forEach(evt => {
    noBtn.addEventListener(evt, moveNoButton);
});
</script>
